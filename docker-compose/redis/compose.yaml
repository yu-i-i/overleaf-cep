services:
  redis:
    image: "redis:8.6-alpine"
    container_name: redis
    hostname: redis
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 3s
    command: --save 60 1 --loglevel warning
    volumes:
      - ./data:/data
      - ./backup:/backup
      - /var/run/docker.sock:/var/run/docker.sock
    expose:
      - 6379
    environment:
      REDIS_AOF_PERSISTENCE: "true"

