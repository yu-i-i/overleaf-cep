name: Security checks

on:
  push:
  pull_request:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  trivy:
    name: Trivy scans
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Trivy filesystem scan
        run: |
          docker run --rm -v "$PWD:/repo" aquasec/trivy:0.68.1 fs \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 0 \
            /repo

      - name: Trivy config scan
        run: |
          docker run --rm -v "$PWD:/repo" aquasec/trivy:0.68.1 config \
            --severity CRITICAL,HIGH \
            --exit-code 0 \
            /repo

  npm-audit:
    name: npm audit report
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: npm audit report only
        # This fork has a large workspace dependency graph and inherited issues can
        # be noisy. Keep audit visible without blocking hardening patches by default.
        run: |
          npm ci || true
          npm audit --workspaces --audit-level=high || true
          exit 0
